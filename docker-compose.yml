services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-lib}
      MYSQL_USER: ${DB_USER:-lib}
      MYSQL_PASSWORD: ${DB_PASSWORD:-lib}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  app:
    build: .
    image: firechickenmp4/library-system
    depends_on:
      db:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-lib}
      DB_USER: ${DB_USER:-lib}
      DB_PASSWORD: ${DB_PASSWORD:-lib}
    restart: unless-stopped

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    image: firechickenmp4/lib-caddy
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  mysql_data:
