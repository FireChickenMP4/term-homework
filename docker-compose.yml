services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-lib}
      MYSQL_USER: ${DB_USER:-lib}
      MYSQL_PASSWORD: ${DB_PASSWORD:-lib}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 3s
      timeout: 3s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  app:
    image: firechickenmp4/library-system:${TAG:-latest}
    depends_on:
      db:
        condition: service_healthy
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-lib}
      DB_USER: ${DB_USER:-lib}
      DB_PASSWORD: ${DB_PASSWORD:-lib}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8808/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "8808:8808"
    restart: unless-stopped

  caddy:
    image: firechickenmp4/lib-caddy:${TAG:-latest}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_started
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  mysql_data:
  caddy_data:
  caddy_config:
