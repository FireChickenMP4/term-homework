name: Build & Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        description: "仅部署（跳过构建）"
        type: boolean
        default: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.check.outputs.backend_any_changed }}
      frontend: ${{ steps.check.outputs.frontend_any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed files
        id: check
        uses: tj-actions/changed-files@v44
        with:
          files_yaml: |
            backend:
              - src/**
              - CMakeLists.txt
              - Dockerfile
              - docker-entrypoint.sh
              - config.docker.json
              - .github/workflows/deploy.yml
            frontend:
              - frontend/**
              - Dockerfile.caddy
              - Caddyfile
              - .github/workflows/deploy.yml

  backend:
    needs: [ changes ]
    if: ${{ (github.event_name == 'workflow_dispatch' && !github.event.inputs.deploy_only) || needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: firechickenmp4/library-system
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache-filters: runtime

      - name: Print digest
        run: |
          echo "## Backend image" >> $GITHUB_STEP_SUMMARY
          echo "digest: ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "tags: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "digest=${{ steps.build.outputs.digest }}" >> $GITHUB_OUTPUT

  caddy:
    needs: [ changes ]
    if: ${{ (github.event_name == 'workflow_dispatch' && !github.event.inputs.deploy_only) || needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: firechickenmp4/lib-caddy
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.caddy
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print digest
        run: |
          echo "## Caddy image" >> $GITHUB_STEP_SUMMARY
          echo "digest: ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "tags: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY

  deploy:
    needs: [ changes, backend, caddy ]
    if: ${{ !cancelled() && (needs.backend.result == 'success' || needs.backend.result == 'skipped') && (needs.caddy.result == 'success' || needs.caddy.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,Caddyfile"
          target: ~/lib-system/
          strip_components: 0

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/lib-system
            docker compose pull
            docker compose up -d
            docker image prune -f
