name: Build & Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        description: "仅部署（跳过构建）"
        type: boolean
        default: false

env:
  DOCKER_IMAGE: firechickenmp4/library-system

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.build-changes.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check build changes
        id: build-changes
        uses: tj-actions/changed-files@v44
        with:
          files: |
            src/**
            frontend/**
            CMakeLists.txt
            Dockerfile
            .dockerignore
            .github/workflows/deploy.yml

  build:
    needs: [ changes ]
    if: ${{ needs.changes.outputs.build == 'true' || (github.event_name == 'workflow_dispatch' && !github.event.inputs.deploy_only) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [ changes, build ]
    if: ${{ !cancelled() && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync compose & caddy config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,Caddyfile"
          target: "~/lib-system/"
          strip_components: 0

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p ~/lib-system
            cd ~/lib-system
            docker compose pull
            docker compose up -d
            docker image prune -f
