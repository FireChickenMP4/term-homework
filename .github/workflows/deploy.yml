name: Build & Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      deploy_only:
        description: "仅部署（跳过构建）"
        type: boolean
        default: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.check.outputs.backend_any_changed }}
      frontend: ${{ steps.check.outputs.frontend_any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed files
        id: check
        uses: tj-actions/changed-files@v44
        with:
          files_yaml: |
            backend:
              - src/**
              - CMakeLists.txt
              - Dockerfile
              - docker-entrypoint.sh
              - config.docker.json
              - .github/workflows/deploy.yml
            frontend:
              - frontend/**
              - Dockerfile.caddy
              - Caddyfile
              - .github/workflows/deploy.yml

  backend:
    needs: [ changes ]
    if: ${{ (github.event_name == 'workflow_dispatch' && !github.event.inputs.deploy_only) || needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.tag.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: firechickenmp4/library-system
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=firechickenmp4/library-system:cache
          cache-to: type=registry,ref=firechickenmp4/library-system:cache,mode=max

      - name: Extract SHA tag
        id: tag
        run: echo "sha_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Print digest
        run: |
          echo "## Backend image" >> $GITHUB_STEP_SUMMARY
          echo "tag: ${{ steps.tag.outputs.sha_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "digest: ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

  caddy:
    needs: [ changes ]
    if: ${{ (github.event_name == 'workflow_dispatch' && !github.event.inputs.deploy_only) || needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.tag.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: firechickenmp4/lib-caddy
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.caddy
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=firechickenmp4/lib-caddy:cache
          cache-to: type=registry,ref=firechickenmp4/lib-caddy:cache,mode=max

      - name: Extract SHA tag
        id: tag
        run: echo "sha_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Print digest
        run: |
          echo "## Caddy image" >> $GITHUB_STEP_SUMMARY
          echo "tag: ${{ steps.tag.outputs.sha_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "digest: ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

  deploy:
    needs: [ changes, backend, caddy ]
    if: ${{ !cancelled() && (needs.backend.result == 'success' || needs.backend.result == 'skipped') && (needs.caddy.result == 'success' || needs.caddy.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml,Caddyfile"
          target: ~/lib-system/
          strip_components: 0

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/lib-system

            SHA="${{ github.sha }}" && SHA="${SHA::7}"
            TAG_BACKEND=${{ needs.backend.outputs.sha_tag || '' }}
            TAG_CADDY=${{ needs.caddy.outputs.sha_tag || '' }}

            # backend 有构建才拉新镜像，否则保持现有容器
            if [ -n "$TAG_BACKEND" ]; then
              docker pull firechickenmp4/library-system:"$TAG_BACKEND" || { TAG_BACKEND=latest; docker pull firechickenmp4/library-system:latest; }
              docker tag firechickenmp4/library-system:"$TAG_BACKEND" firechickenmp4/library-system:latest 2>/dev/null || true
              TAG=$TAG_BACKEND docker compose up -d app
            else
              echo "Backend unchanged, skipping"
            fi

            # caddy 同理
            if [ -n "$TAG_CADDY" ]; then
              docker pull firechickenmp4/lib-caddy:"$TAG_CADDY" || { TAG_CADDY=latest; docker pull firechickenmp4/lib-caddy:latest; }
              docker tag firechickenmp4/lib-caddy:"$TAG_CADDY" firechickenmp4/lib-caddy:latest 2>/dev/null || true
              TAG=$TAG_CADDY docker compose up -d caddy
            else
              echo "Caddy unchanged, skipping"
            fi

            # 修复 MySQL 用户认证插件（caching_sha2_password → mysql_native_password）
            docker compose exec -T db mysql -u root -proot \
              -e "ALTER USER IF EXISTS '${DB_USER:-lib}'@'%' IDENTIFIED WITH mysql_native_password BY '${DB_PASSWORD:-lib}'; FLUSH PRIVILEGES;" \
              2>/dev/null || true

            docker image prune -af
